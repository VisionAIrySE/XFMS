# Smithery config for XFMS — registers the MCP server with the
# Smithery registry (smithery.ai) so users can one-click install
# into Claude Desktop, Cursor, Continue, Windsurf, etc.
#
# XFMS is one module of the Xpansion Framework — a unified
# architecture for governing AI-assisted work. See
# https://xpansion.dev.
#
# When users install via Smithery's UI, they get a form asking for
# their XFMS access key before the server starts. The key is free
# (request at xpansion.dev/xfms/get-started). All inference cost is
# covered by the hosted endpoint — no OpenRouter key required.

name: xfms
displayName: "XFMS — Pick the right LLM for your task"
description: >
  Hosted recommender that aggregates 8 independent benchmark sources
  (no provider self-reports) and returns a ranked LLM shortlist with
  plain-English rationale per pick. State your purpose, get a
  defensible answer. Inference cost is fully covered — no OpenRouter
  key required. Part of the Xpansion Framework (https://xpansion.dev).
homepage: https://xpansion.dev
repository: https://github.com/VisionAIrySE/XFMS
license: MIT
keywords:
  - llm
  - model-selection
  - benchmarks
  - llm-evaluation
  - xpansion-framework
  - hosted

# stdio is the transport every local MCP client (Claude Desktop,
# Cursor, Continue, Windsurf) speaks. Smithery's install button
# writes the right snippet into the user's client config.
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - xfmsApiKey
    properties:
      xfmsApiKey:
        type: string
        title: "XFMS API Key"
        description: >
          Identifies you to the hosted XFMS API. Free — request at
          https://xpansion.dev/xfms/get-started. You'll get the key
          by email after confirming. All inference cost is covered
          by the hosted endpoint; no OpenRouter key required.
  commandFunction: |
    (config) => ({
      command: "xfms-mcp",
      env: {
        XFMS_API_KEY: config.xfmsApiKey
      }
    })

# Install prerequisite — users need the Python package on their
# machine before Smithery's command can run. The Smithery listing
# surfaces this as the pre-install step.
install:
  command: "pip install 'xfms[mcp]'"
  description: >
    Installs the XFMS Python client plus the MCP server. Requires
    Python 3.10 or newer. Alternative: pipx install 'xfms[mcp]'
    (recommended) or uv tool install 'xfms[mcp]'.
